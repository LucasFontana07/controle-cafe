<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Controle de Cafés V3.1</title><link rel="stylesheet" href="styles.css"></head>
<body>
<h1>☕ Controle de Cafés V3.1</h1>
<div class="stats">
<div>Total: <span id="total">0</span></div>
<div>Média: <span id="media">0</span></div>
</div>
<input id="filtro" placeholder="Pesquisar café ou receita">
<form id="form">
<input id="nome" placeholder="Receita" required>
<input id="cafe" placeholder="Café">
<input id="metodo" placeholder="Método">
<input id="moagem" type="number" placeholder="Moagem Timemore C3">
<textarea id="degustacao" placeholder="Degustação"></textarea>
<textarea id="conclusao" placeholder="Conclusão do gosto do café"></textarea>
<select id="nota"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
<button>Salvar</button>
</form>
<div id="lista"></div>
<script src="app.js"></script>
</body></html>
