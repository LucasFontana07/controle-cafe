<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diário de Cafés</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>☕ Diário de Cafés</h1>

<div class="card">
<h2>Novo Registro</h2>
<input id="marca" placeholder="Marca">
<input id="variedade" placeholder="Variedade">
<input id="sabores" placeholder="Sabores">
<input id="metodo" placeholder="Método de extração">
<input id="moagem" type="number" placeholder="Moagem C3 (cliques)">
<input id="receita" placeholder="Receita (20g / 300ml)">
<input id="data" type="date">

<div id="stars" class="stars"></div>
<button onclick="salvar()">Salvar</button>
</div>

<div class="card">
<h2>Filtros</h2>
<input id="fMarca" placeholder="Marca" oninput="render()">
<input id="fVariedade" placeholder="Variedade" oninput="render()">
<input id="fMetodo" placeholder="Método" oninput="render()">
<select id="fNota" onchange="render()">
<option value="">Todas notas</option>
<option value="5">5 estrelas</option>
<option value="4">4 estrelas</option>
<option value="3">3 estrelas</option>
<option value="2">2 estrelas</option>
<option value="1">1 estrela</option>
</select>
</div>

<div class="stats">
<div>Total: <span id="total">0</span></div>
<div>Média: <span id="media">0</span></div>
</div>

<div class="card">
<h2>Registros</h2>
<table>
<thead><tr><th>Data</th><th>Marca</th><th>Método</th><th>Moagem</th><th>Nota</th><th></th></tr></thead>
<tbody id="lista"></tbody>
</table>
</div>

<div class="card">
<h2>🏆 Ranking de Receitas</h2>
<table>
<thead><tr><th>Receita</th><th>Método</th><th>Moagem</th><th>Média</th></tr></thead>
<tbody id="ranking"></tbody>
</table>
</div>
</div>
<script src="app.js"></script>
</body>
</html>
